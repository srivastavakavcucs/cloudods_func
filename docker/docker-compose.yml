services:
  functions:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "7071:80"
    volumes:
      - ..:/home/site/wwwroot
    environment:
      FUNCTIONS_WORKER_RUNTIME: python
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UKvz1bgFIkOdaHT5vRGrTJLBASJ5E9pXNMRdQ==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      PYTHON_ENABLE_OPENTELEMETRY: "0"
      AzureWebJobsFeatureFlags: EnableWorkerIndexing
      LOG_LEVEL: DEBUG
    depends_on:
      - azurite

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
